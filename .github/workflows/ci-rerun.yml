# One-shot auto-rerun for the brittle device jobs.
#
# The Android emulator and iOS simulator CI jobs sometimes fail for reasons
# that have nothing to do with the change under test: a hosted runner whose
# emulator never finishes booting, a CoreSimulator that wedges, an empty-log
# hang. Those deserve exactly ONE automatic retry. Any other failure - a real
# test break, a compile error - must stay red and visible.
#
# This workflow watches CI completions and reruns the FAILED jobs of a run
# once, but ONLY when every failed job is in the known-brittle allowlist AND
# the run is on its first attempt (so a rerun can never loop). The allowlist
# and the whole decision live in Util/ci_rerun_decider.py, which is unit-checked
# by --selftest here before its verdict is trusted. If ANY failed job is outside
# the allowlist, this workflow does nothing.
name: CI auto-rerun

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# never run two reruns for the same upstream run at once
concurrency:
  group: ci-rerun-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  rerun:
    # only consider a failed FIRST attempt; a success or a later attempt is
    # nothing to heal (the once-only guard is also re-checked in the decider).
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1
    runs-on: ubuntu-latest
    permissions:
      actions: write     # gh run rerun
      contents: read      # checkout the decider
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Self-check the decision table
        # trust the verdict only if its own unit cases pass on this checkout
        run: python3 Util/ci_rerun_decider.py --selftest

      - name: Decide and (maybe) rerun the failed jobs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          echo "Evaluating CI run $RUN_ID (attempt $RUN_ATTEMPT): $RUN_URL"

          # the jobs of THIS attempt (a rerun of --failed only re-runs these)
          jobs_json="$(gh api \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/attempts/${RUN_ATTEMPT}/jobs" \
            --paginate 2>/dev/null || \
            gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs" --paginate)"

          echo "Failed jobs in this run:"
          echo "$jobs_json" | python3 -c 'import json,sys; d=json.load(sys.stdin); [print("  -", j["name"], "->", j.get("conclusion")) for j in d.get("jobs", []) if (j.get("conclusion") or "") in ("failure","timed_out")]' || true

          decision="$(printf '%s' "$jobs_json" | python3 Util/ci_rerun_decider.py --attempt "$RUN_ATTEMPT")"
          echo "$decision"

          if [ "$decision" = "DECISION: rerun" ]; then
            echo "::notice::auto-rerunning the failed (brittle) jobs of run $RUN_ID"
            gh run rerun "$RUN_ID" --failed
          else
            echo "::notice::not rerunning run $RUN_ID (a non-brittle job failed, or the once-only guard applies)"
          fi
