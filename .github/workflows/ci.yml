            vcpkg-classic-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/.ccache
          key: ccache-android-classic-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-android-classic-${{ runner.os }}-
            ccache-classic-${{ runner.os }}-

      - name: Configure Android + host (vcpkg dependency builds)
        run: |
          bash Util/ci_configure.sh --preset android-emulator-debug-ci-classic \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build
          bash Util/ci_configure.sh --preset linux-debug-classic \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      # save right after the configures (that is when vcpkg builds/installs),
      # BEFORE anything that can fail - a red build must not lose the cold
      # dependency work
      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build + package the Android player (MUST pass)
        run: |
          cmake --build --preset android-emulator-debug-ci-classic --target orkige_player
          # a binary-cache hit skips source extraction, but the APK packer
          # pulls SDL's Java glue from the source tarball - prime the download
          # (classic mode from a neutral cwd; the repo root is manifest mode)
          if ! ls "$VCPKG_ROOT_DIR"/downloads/libsdl-org-SDL-release-3.*.tar.gz >/dev/null 2>&1; then
            (cd "$VCPKG_ROOT_DIR" && ./vcpkg install sdl3 --only-downloads)
          fi
          tools/player/android/package_apk.sh build/android-emulator-debug-ci-classic

      - name: Build the host editor (drives the Play test)
        run: cmake --build --preset linux-debug-classic

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /home/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Enable emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Emulator Play test (MUST pass)
        uses: reactivecircus/android-emulator-runner@v2.38.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # The emulator action runs EACH LINE of this script as its own
          # `sh -c`: exports do not persist to the next line and a trailing
          # backslash is passed through as a literal argument. Everything
          # the ctest invocation needs must therefore share its one line.
          script: |
            adb install -r build/android-emulator-debug-ci-classic/apk/OrkigePlayer.apk
            adb shell pm path com.orkitec.orkigeplayer
            LVP_ICD=$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1); export VK_DRIVER_FILES="$LVP_ICD" VK_ICD_FILENAMES="$LVP_ICD" ALSOFT_DRIVERS=null SDL_VIDEO_DRIVER=x11; xvfb-run -a -s "-screen 0 1280x1024x24 +extension RANDR" ctest --preset device-linux-android-ci-classic --timeout 420 --repeat until-pass:2

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-emulator-classic-logs
          path: |
            build/linux-debug-classic/Testing/**/*.log
            build/android-emulator-debug-ci-classic/**/*.log
            *.log
          if-no-files-found: ignore

  # macOS on the default (Ogre-Next) flavor: build everything + the headless
  # unit suite, then build, boot and test the iOS Simulator player.
  macos-next:
    name: macOS next - desktop suite
    # macos-15's default toolchain: openal-soft 1.25 needs a newer AppleClang
    # than the macos-14 image ships (CTAD in its event handling)
    runs-on: macos-15
    timeout-minutes: 360
    env:
      VCPKG_ROOT_DIR: /Users/runner/Development/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: /Users/runner/vcpkg-binary-cache
      CCACHE_DIR: /Users/runner/.ccache
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          # the runner image ships an untrusted third-party tap that makes
          # every brew call warn - drop it, it serves nothing here
          brew untap aws/tap 2>/dev/null || true
          brew install ninja ccache autoconf automake autoconf-archive libtool

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /Users/runner/vcpkg-binary-cache
          key: vcpkg-macos-next-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-macos-next-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /Users/runner/.ccache
          key: ccache-macos-next-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-next-${{ runner.os }}-

      - name: Configure (macos-debug)
        run: |
          bash Util/ci_configure.sh --preset macos-debug \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /Users/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build (engine + editor + player + tests)
        run: cmake --build --preset macos-debug

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /Users/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Unit tests (headless - MUST pass)
        id: macos_units
        run: ctest --preset unit-macos-ci

      - name: Complete desktop suite (Metal - MUST pass)
        id: macos_desktop
        env:
          ALSOFT_DRIVERS: "null"
        run: |
          # list_play_targets probes adb and simctl. Warm both outside the
          # MCP request deadline so a cold hosted runner cannot consume the
          # whole request while device discovery services spin up.
          if command -v adb > /dev/null 2>&1; then
            adb start-server
          fi
          xcrun simctl list devices available > /dev/null 2>&1 || true
          ctest --preset desktop-macos-ci --timeout 300 --repeat until-pass:2


  # macOS on the classic OGRE compatibility flavor: the same complete desktop
  # suite the Linux classic job runs, on Apple hardware - including the
  # classic Vulkan-RS runs through MoltenVK (driver-tier, from brew, exactly
  # the documented dev-machine setup).
  macos-classic:
    name: macOS classic - desktop suite
    runs-on: macos-15
    timeout-minutes: 360
    env:
      VCPKG_ROOT_DIR: /Users/runner/Development/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: /Users/runner/vcpkg-binary-cache
      CCACHE_DIR: /Users/runner/.ccache
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          # the runner image ships an untrusted third-party tap that makes
          # every brew call warn - drop it, it serves nothing here
          brew untap aws/tap 2>/dev/null || true
          brew install ninja ccache autoconf automake autoconf-archive libtool molten-vk

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /Users/runner/vcpkg-binary-cache
          key: vcpkg-macos-classic-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-macos-classic-${{ runner.os }}-
            vcpkg-macos-next-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /Users/runner/.ccache
          key: ccache-macos-classic-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-classic-${{ runner.os }}-
            ccache-macos-next-${{ runner.os }}-

      - name: Configure (macos-debug-classic)
        run: |
          bash Util/ci_configure.sh --preset macos-debug-classic \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: Build (engine + editor + player + tests)
        run: cmake --build --preset macos-debug-classic

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /Users/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /Users/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Unit tests (headless - MUST pass)
        run: ctest --preset unit-macos-classic-ci

      # NO windowed suite on this job: hosted-mac virtual GPUs are unreliable
      # for classic in both directions (the deprecated GL stack exhausts
      # contexts over a long run; MoltenVK runs intermittently wedge or crash
      # at boot). Classic's full windowed gate is the Linux job (llvmpipe,
      # consistently green) and real-GPU machines locally; this job holds the
      # Apple-hardware build + headless-unit line.
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macos-classic-logs
          path: |
            build/macos-debug-classic/Testing/**/*.log
            build/macos-debug-classic/tests/**/*.log
            build/macos-debug-classic/tests/**/*.png
          if-no-files-found: ignore

  # iOS Simulator on the default Ogre-Next/Metal flavor, as its own job:
  # the SIMULATOR PLAYER builds first (fail fast), the host editor follows
  # (it drives the export/Play/safe-area device tests), the simulators boot
  # last.
  ios-simulator-next:
    name: iOS simulator next - build + device tests
    runs-on: macos-15
    timeout-minutes: 360
    env:
      VCPKG_ROOT_DIR: /Users/runner/Development/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: /Users/runner/vcpkg-binary-cache
      CCACHE_DIR: /Users/runner/.ccache
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          # the runner image ships an untrusted third-party tap that makes
          # every brew call warn - drop it, it serves nothing here
          brew untap aws/tap 2>/dev/null || true
          brew install ninja ccache autoconf automake autoconf-archive libtool

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /Users/runner/vcpkg-binary-cache
          key: vcpkg-ios-next-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-ios-next-${{ runner.os }}-
            vcpkg-macos-next-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /Users/runner/.ccache
          key: ccache-ios-next-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-ios-next-${{ runner.os }}-
            ccache-macos-next-${{ runner.os }}-

      - name: Configure Simulator + host (vcpkg dependency builds)
        run: |
          bash Util/ci_configure.sh --preset ios-simulator-debug \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build
          bash Util/ci_configure.sh --preset macos-debug \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      # save right after the configures (that is when vcpkg builds/installs),
      # BEFORE anything that can fail - a red build must not lose the cold
      # dependency work
      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /Users/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build the Simulator player (MUST pass)
        run: cmake --build --preset ios-simulator-debug --target orkige_player

      - name: Build the host editor (drives the device tests)
        run: cmake --build --preset macos-debug

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /Users/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Prepare iPhone 16 simulators (main + pre-warmed boot device)
        run: |
          DEVICE_TYPE=$(xcrun simctl list devicetypes -j | python3 -c 'import json,sys; d=json.load(sys.stdin)["devicetypes"]; phones=[x for x in d if x["name"].startswith("iPhone") and "SE" not in x["name"]]; print(next((x["identifier"] for x in phones if "iPhone 16 Pro" in x["name"]), phones[0]["identifier"]))')
          RUNTIME=$(xcrun simctl list runtimes available -j | python3 -c 'import json,sys; d=json.load(sys.stdin)["runtimes"]; ios=[x for x in d if ".iOS-" in x["identifier"]]; print(max(ios, key=lambda x: tuple(map(int, x["version"].split("."))))["identifier"])')
          UDID=$(xcrun simctl create orkige-ci "$DEVICE_TYPE" "$RUNTIME")
          echo "ORKIGE_CI_SIMULATOR=$UDID" >> "$GITHUB_ENV"

          # CoreSimulator occasionally fails its first boot on hosted runners.
          # Open the UI process explicitly and retry with a bounded bootstatus
          # wait instead of hanging the whole job.
          open "$(xcode-select -p)/Applications/Simulator.app"
          BOOTED=false
          for attempt in 1 2 3; do
            echo "Simulator boot attempt $attempt/3 ($UDID)"
            if [ "$attempt" -gt 1 ]; then
              xcrun simctl shutdown "$UDID" || true
              sleep 5
            fi
            xcrun simctl boot "$UDID" || true
            # a HEALTHY hosted runner boots in 2-3.5 minutes; 180s per attempt
            # exhausted all three retries on a slow-but-sound runner
            if ORKIGE_SIMULATOR_UDID="$UDID" python3 -c 'import os,subprocess; subprocess.run(["xcrun", "simctl", "bootstatus", os.environ["ORKIGE_SIMULATOR_UDID"], "-b"], check=True, timeout=420)'; then
              BOOTED=true
              break
            fi
          done
          if [ "$BOOTED" != true ]; then
            xcrun simctl list devices available
            exit 1
          fi
          xcrun simctl install "$UDID" build/ios-simulator-debug/tools/player/OrkigePlayer.app

          # a SECOND device, pre-warmed then shut down, for the boot-path Play
          # test (editor_play_simulator_boot): its auto-shutdown picker prefers
          # ORKIGE_CI_SIMULATOR_SHUTDOWN, and a warm re-boot takes seconds
          # where a never-booted device's cold first boot can exceed the test
          # budget on a loaded runner. Warming rides the same retry pattern.
          UDID2=$(xcrun simctl create orkige-ci-boot "$DEVICE_TYPE" "$RUNTIME")
          echo "ORKIGE_CI_SIMULATOR_SHUTDOWN=$UDID2" >> "$GITHUB_ENV"
          WARMED=false
          for attempt in 1 2 3; do
            echo "Warm-boot attempt $attempt/3 ($UDID2)"
            if [ "$attempt" -gt 1 ]; then
              xcrun simctl shutdown "$UDID2" || true
              sleep 5
            fi
            xcrun simctl boot "$UDID2" || true
            if ORKIGE_SIMULATOR_UDID="$UDID2" python3 -c 'import os,subprocess; subprocess.run(["xcrun", "simctl", "bootstatus", os.environ["ORKIGE_SIMULATOR_UDID"], "-b"], check=True, timeout=420)'; then
              WARMED=true
              break
            fi
          done
          if [ "$WARMED" != true ]; then
            xcrun simctl list devices available
            exit 1
          fi
          xcrun simctl shutdown "$UDID2"

      - name: Simulator export + runtime tests (MUST pass)
        env:
          ALSOFT_DRIVERS: "null"
        run: ctest --preset device-macos-ios-ci --timeout 1400 --repeat until-pass:2

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator-next-diagnostics
          path: |
            build/macos-debug/Testing/**/*.log
            build/macos-debug/tests/**/*.log
            build/macos-debug/tests/**/*.png
            ~/Library/Logs/DiagnosticReports/**
          if-no-files-found: ignore

      - name: Remove CI simulators
        if: always() && env.ORKIGE_CI_SIMULATOR != ''
        run: |
          xcrun simctl shutdown "$ORKIGE_CI_SIMULATOR" || true
          xcrun simctl delete "$ORKIGE_CI_SIMULATOR" || true
          if [ -n "$ORKIGE_CI_SIMULATOR_SHUTDOWN" ]; then
            xcrun simctl shutdown "$ORKIGE_CI_SIMULATOR_SHUTDOWN" || true
            xcrun simctl delete "$ORKIGE_CI_SIMULATOR_SHUTDOWN" || true
          fi

  # iOS Simulator on the classic OGRE/GLES2 flavor, as its own job:
  # the SIMULATOR PLAYER builds first (fail fast), the host editor follows
  # (it drives the export/Play/safe-area device tests), the simulators boot
  # last.
  ios-simulator-classic:
    name: iOS simulator classic - player build + export structure
    runs-on: macos-15
    timeout-minutes: 360
    env:
      VCPKG_ROOT_DIR: /Users/runner/Development/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: /Users/runner/vcpkg-binary-cache
      CCACHE_DIR: /Users/runner/.ccache
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          # the runner image ships an untrusted third-party tap that makes
          # every brew call warn - drop it, it serves nothing here
          brew untap aws/tap 2>/dev/null || true
          brew install ninja ccache autoconf automake autoconf-archive libtool molten-vk

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /Users/runner/vcpkg-binary-cache
          key: vcpkg-ios-classic-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-ios-classic-${{ runner.os }}-
            vcpkg-macos-classic-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /Users/runner/.ccache
          key: ccache-ios-classic-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-ios-classic-${{ runner.os }}-
            ccache-macos-classic-${{ runner.os }}-

      - name: Configure Simulator + host (vcpkg dependency builds)
        run: |
          bash Util/ci_configure.sh --preset ios-simulator-debug-classic \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build
          bash Util/ci_configure.sh --preset macos-debug-classic \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      # save right after the configures (that is when vcpkg builds/installs),
      # BEFORE anything that can fail - a red build must not lose the cold
      # dependency work
      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /Users/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build the Simulator player (MUST pass)
        run: cmake --build --preset ios-simulator-debug-classic --target orkige_player

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /Users/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      # the classic editor-session device tests (Play/cold-boot/safe-area) run
      # on the ios-simulator-next job and on local hardware: the HOST classic
      # editor is unreliable on the hosted runner's virtual GPU (the same
      # finding that scopes the macos-classic job to build + units), so this
      # job verifies the classic Simulator player BUILDS and EXPORTS correctly
      - name: Player export structure test (MUST pass, may not skip)
        run: |
          # the export test skips (77) when it cannot find the built player
          # app - on this job the app was just built, so a skip means the
          # test looked in the wrong tree and must fail loudly
          test -d build/ios-simulator-debug-classic/tools/player/OrkigePlayer.app
          ctest --preset device-macos-ios-ci-classic --timeout 300 --output-log ctest-export.log
          ! grep -q "Skipped" ctest-export.log

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator-classic-diagnostics
          path: |
            build/macos-debug-classic/Testing/**/*.log
            build/macos-debug-classic/tests/**/*.log
            build/macos-debug-classic/tests/**/*.png
            ~/Library/Logs/DiagnosticReports/**
          if-no-files-found: ignore

  # Windows on the default Ogre-Next flavor. The standard hosted runner has
  # no physical GPU/Vulkan ICD, so the desktop tests install a software driver
  # with Win32 presentation support.
  windows-next:
    name: Windows next (Vulkan) - build + desktop tests
    runs-on: windows-latest
    timeout-minutes: 240
    env:
      VCPKG_ROOT_DIR: C:/Users/runneradmin/Development/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: C:/Users/runneradmin/vcpkg-binary-cache
      # MSVC, not the workflow-level clang (that setting serves the POSIX jobs)
      CC: cl
      CXX: cl
    steps:
      - uses: actions/checkout@v7

      - name: Set up the MSVC environment for Ninja
        # first-party vcvarsall import (the third-party action for this stayed
        # on a deprecated Node runtime); vswhere ships on every runner image
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "no Visual Studio with C++ tools found" }
          cmd /c "`"$vsPath\VC\Auxiliary\Build\vcvarsall.bat`" x64 > nul && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              Add-Content -Path $env:GITHUB_ENV -Value "$($Matches[1])=$($Matches[2])"
            }
          }

      - name: Check out pinned vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT_DIR"
          git -C "$env:VCPKG_ROOT_DIR" checkout "$env:VCPKG_COMMIT"
          & "$env:VCPKG_ROOT_DIR/bootstrap-vcpkg.bat" -disableMetrics
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: C:/Users/runneradmin/vcpkg-binary-cache
          key: vcpkg-windows-next-v2-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-windows-next-v2-${{ runner.os }}-

      - name: Configure (windows-debug)
        shell: pwsh
        run: |
          bash Util/ci_configure.sh --preset windows-debug -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: C:/Users/runneradmin/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build (engine + editor + player + tests)
        shell: pwsh
        run: cmake --build --preset windows-debug

      - name: Unit tests (headless)
        shell: pwsh
        run: ctest --preset unit-windows

      # The Android emulator's bundled SwiftShader ICD is headless on Windows:
      # it omits VK_KHR_win32_surface. Mesa's lavapipe ICD provides software
      # Vulkan with Win32 presentation, so the complete windowed suite remains
      # a hard gate on hosted runners without a GPU.
      - name: Install Mesa software Vulkan driver
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-mesa

      - name: Locate Mesa lavapipe Vulkan driver
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $icd = Join-Path $env:MSYS2_LOCATION "ucrt64/share/vulkan/icd.d/lvp_icd.x86_64.json"
          if (-not (Test-Path $icd)) {
            throw "The MSYS2 Mesa package did not provide $icd"
          }
          Write-Host "Using Vulkan ICD: $icd"
          "VK_DRIVER_FILES=$icd" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VK_ICD_FILENAMES=$icd" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # the ICD's lvp DLL depends on the MSYS2 UCRT runtime DLLs; the test
          # processes load it OUTSIDE any MSYS2 shell, so those DLLs must be
          # resolvable on the plain Windows PATH or instance creation fails
          # with no devices
          $ucrtBin = Join-Path $env:MSYS2_LOCATION "ucrt64/bin"
          $ucrtBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          (Join-Path $env:MSYS2_LOCATION "ucrt64/bin") | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Vulkan loader diagnostics
        shell: pwsh
        run: |
          # the engine-side loader advertises NO surface extensions (win32
          # support missing) - identify which vulkan-1.dll the processes
          # resolve and what a known-good loader reports on this machine
          Get-Command vulkan-1.dll -ErrorAction SilentlyContinue | Format-List
          Get-ChildItem "C:/Windows/System32/vulkan-1.dll" -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse build/windows-debug/vcpkg_installed -Filter vulkan-1.dll -ErrorAction SilentlyContinue | Select-Object FullName
          Get-ChildItem -Recurse build/windows-debug -Filter vulkan-1.dll -ErrorAction SilentlyContinue | Select-Object FullName -First 5

      - name: Use the system Vulkan loader for the test run
        shell: pwsh
        run: |
          # our processes load the vcpkg-built vulkan-1.dll copied next to every
          # test exe, and it enumerates almost nothing - not even VK_KHR_surface -
          # so the render system honestly refuses to draw. MSYS2's Mesa loader is
          # a complete one and is already on PATH; remove the copies so the DLL
          # search resolves it instead.
          Get-ChildItem -Recurse build/windows-debug -Filter vulkan-1.dll |
            ForEach-Object { Write-Host "removing $($_.FullName)"; Remove-Item $_.FullName -Force }

      - name: Complete Windows desktop suite (lavapipe - MUST pass)
        shell: pwsh
        env:
          ALSOFT_DRIVERS: "null"
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          # the ICD is registered in the REGISTRY, not (only) the environment:
          # the runner executes elevated (runneradmin), and the Vulkan loader
          # deliberately IGNORES VK_DRIVER_FILES/VK_ICD_FILENAMES in elevated
          # processes - both the GITHUB_ENV and the in-process env attempts
          # ended in "vkCreateInstance: Found no drivers". Registry-registered
          # drivers are honored regardless of elevation.
          $icd = Join-Path $env:MSYS2_LOCATION "ucrt64/share/vulkan/icd.d/lvp_icd.x86_64.json"
          if (-not (Test-Path $icd)) { throw "lavapipe ICD not found at $icd" }
          New-Item -Path "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers" -Force | Out-Null
          New-ItemProperty -Path "HKLM:\SOFTWARE\Khronos\Vulkan\Drivers" `
            -Name $icd -Value 0 -PropertyType DWord -Force | Out-Null
          # the lvp DLL's MSYS2 UCRT runtime deps must resolve on PATH
          $env:PATH = (Join-Path $env:MSYS2_LOCATION "ucrt64/bin") + ";" + $env:PATH
          Write-Host "registered Vulkan ICD in HKLM: $icd"
          # fast gate: ONE windowed smoke test first, so a wholesale-broken
          # Vulkan environment fails the step in about a minute instead of
          # every windowed test in the suite eating its full timeout
          ctest --preset desktop-windows -R "render_next_smoke" --timeout 120
          if ($LASTEXITCODE -ne 0) { throw "windowed smoke test failed - Vulkan environment is broken, skipping the suite" }
          ctest --preset desktop-windows --timeout 300 --repeat until-pass:2

      - name: Upload Windows test diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-next-logs
          path: |
            build/windows-debug/Testing/**/*.log
            build/windows-debug/tests/**/*.log
            build/windows-debug/tests/**/*.png
            projects/jumper-native/native/build*/orkige_module_diag.txt
            *.log
          if-no-files-found: ignore

  # Windows on the classic OGRE compatibility flavor: compile coverage +
  # the headless unit suite. The windowed classic suite needs a software GL
  # stack Windows runners do not ship; it stays a documented gap while the
  # classic windowed gate runs on Linux (llvmpipe) and macOS.
  windows-classic:
    name: Windows classic - build + unit tests
    runs-on: windows-latest
    timeout-minutes: 240
    env:
      VCPKG_ROOT_DIR: C:/Users/runneradmin/Development/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: C:/Users/runneradmin/vcpkg-binary-cache
      # MSVC, not the workflow-level clang (that setting serves the POSIX jobs)
      CC: cl
      CXX: cl
    steps:
      - uses: actions/checkout@v7

      - name: Set up the MSVC environment for Ninja
        # first-party vcvarsall import (the third-party action for this stayed
        # on a deprecated Node runtime); vswhere ships on every runner image
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "no Visual Studio with C++ tools found" }
          cmd /c "`"$vsPath\VC\Auxiliary\Build\vcvarsall.bat`" x64 > nul && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              Add-Content -Path $env:GITHUB_ENV -Value "$($Matches[1])=$($Matches[2])"
            }
          }

      - name: Check out pinned vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT_DIR"
          git -C "$env:VCPKG_ROOT_DIR" checkout "$env:VCPKG_COMMIT"
          & "$env:VCPKG_ROOT_DIR/bootstrap-vcpkg.bat" -disableMetrics
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: C:/Users/runneradmin/vcpkg-binary-cache
          key: vcpkg-windows-classic-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-windows-classic-${{ runner.os }}-

      - name: Configure (windows-debug-classic)
        shell: pwsh
        run: |
          bash Util/ci_configure.sh --preset windows-debug-classic -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: C:/Users/runneradmin/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build (engine + editor + player + tests)
        shell: pwsh
        run: cmake --build --preset windows-debug-classic

      - name: Unit tests (headless - MUST pass)
        shell: pwsh
        run: ctest --preset unit-windows-classic
