# Orkige CI - Linux build + test on every push and pull request.
#
# Jobs - one per platform x flavor so a failure names itself and every
# verdict lands as early as its own build allows (all run in parallel;
# public-repo runners are free, the only cap is 5 concurrent macOS jobs):
#   linux-next / linux-classic       - full desktop suites (next adds the
#                                    scripting-off gate)
#   linux-sanitizer                  - the ASan/UBSan instrumented tree +
#                                    full suite, zero retries
#   android-emulator-next / -classic - x86_64 player build + emulator Play
#   macos-next / macos-classic       - full desktop suites on Apple hardware
#   ios-simulator-next / -classic    - Simulator player + device tests
#   windows-next                     - build + full desktop suite (lavapipe)
#   windows-classic                  - build + headless units (no software
#                                    GL on hosted Windows for the windowed set)
#
# TIMING EXPECTATIONS: the very first run compiles the whole vcpkg dependency
# set (classic OGRE or Ogre-Next, assimp, freeimage, SDL3, Jolt, OpenAL, Lua,
# imgui, catch2, ... in Debug AND Release) from source - expect 1-2 HOURS per
# job. Every later run restores the vcpkg binary cache + ccache and should
# configure+build in well under 15 minutes. The caches are keyed on
# vcpkg.json + ports/ + triplets/ + the pinned vcpkg commit, so only real
# dependency changes pay the cold price again.
#
# Cache budget: GitHub gives 10 GB per repo; one flavor's binary cache is
# roughly 1-2 GB, ccache is capped at 1 GB per job below.

name: CI

on:
  push:
  pull_request:

# a newer push supersedes the previous run of the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # vcpkg commit the dependency set is proven against locally (the manifest
  # has no builtin-baseline - the checked-out vcpkg tree defines the port
  # versions, so it MUST be pinned for reproducible CI)
  VCPKG_COMMIT: 42e4e33e1505c9f47b58c21e0f557c1571b751ee
  # the presets resolve VCPKG_ROOT to $HOME/Development/vcpkg (same
  # convention as the dev machines - see CMakePresets.json linux-base)
  VCPKG_ROOT_DIR: /home/runner/Development/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: /home/runner/vcpkg-binary-cache
  CCACHE_DIR: /home/runner/.ccache
  # The next job compiles three host configurations (regular, scripting off,
  # and sanitizers, whose object caches do not overlap) plus Android.
  CCACHE_MAXSIZE: 2G
  # PCH-friendly ccache (same setting CLAUDE.md documents for dev machines).
  CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
  # Build with clang, NOT the runner-default gcc. Orkige is a clang-oriented
  # codebase (AppleClang on the dev Macs, .clangd, the containment lint) and
  # vcpkg port builds inherit these via the stock x64-linux triplet's use of
  # the environment compiler. Concretely this fixes the SDL3 port: SDL3
  # gates -Wdocumentation / -fcomment-block-commands=threadsafety behind a
  # compiler-flag probe that FALSE-POSITIVES on gcc (gcc accepts unknown -W
  # flags during the probe, then errors on real use) - genuine clang flags
  # that only work when the compiler really is clang.
  CC: clang
  CXX: clang++

jobs:
  # The public site (https://orkige.orkitec.com): landing page + docs portal +
  # legal pages from Util/make_help_portal.py plus the /api/ class reference
  # (Docs/api/Doxyfile - runner-only tooling). Lives INSIDE the CI workflow so
  # one push shows ONE run; the job needs no engine build and runs in parallel
  # with the test matrix. The generator's hard-failing broken-link gate means
  # a broken docs state never deploys. Manual redeploys: the pages workflow
  # keeps a workflow_dispatch-only trigger.
  site:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - name: Generate the site (landing + portal + legal pages)
        run: python3 Util/make_help_portal.py --output _site
      - name: Install the API-reference tooling
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - name: Render the /api/ class reference from the engine headers
        run: |
          doxygen Docs/api/Doxyfile
          mv Docs/api/build/html _site/api
      - name: Pin the custom domain
        run: echo orkige.orkitec.com > _site/CNAME
      - name: Upload the site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  linux-classic:
    name: Linux classic (GL3Plus) - compatibility build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 240 # cold vcpkg build headroom; cached runs take minutes
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        # - toolchain: build-essential, ninja, ccache, python3 (lint +
        #   integration drivers + asset generators), pkg-config/autotools
        #   (vcpkg port builds)
        # - X11/Wayland dev stacks: SDL3's x11+wayland features and classic
        #   OGRE's GLX window need them; libxaw7-dev/libxt-dev are OGRE's
        #   X11 probe requirements
        # - GL/EGL dev + Mesa: build against GL, run under llvmpipe
        # - xvfb: the virtual X server for the windowed smoke subset
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang ninja-build ccache python3 pkg-config \
            autoconf autoconf-archive automake libtool curl zip unzip tar \
            libx11-dev libxft-dev libxext-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxfixes-dev libxrender-dev libxss-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxt-dev libxaw7-dev \
            libx11-xcb-dev libxcb-randr0-dev libxtst-dev libxinerama-dev \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libglu1-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev libdbus-1-dev libltdl-dev \
            libibus-1.0-dev \
            xvfb mesa-utils libgl1-mesa-dri

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # restore/save split (instead of plain actions/cache) so a failed or
      # timed-out first run still SAVES whatever ports it finished building -
      # the expensive cold build converges across runs instead of restarting
      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: vcpkg-classic-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-classic-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/.ccache
          key: ccache-classic-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-classic-${{ runner.os }}-

      - name: Configure (linux-debug-classic)
        # --clean-after-build keeps vcpkg buildtrees from filling the runner
        # disk during the cold dependency build
        run: |
          bash Util/ci_configure.sh --preset linux-debug-classic \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: Save vcpkg binary cache
        # save right after configure (which is when vcpkg builds/installs) -
        # and even when a later step fails
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build (engine + editor + player + samples + tests)
        run: cmake --build --preset linux-debug-classic

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /home/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Unit tests (headless - MUST pass)
        run: ctest --preset unit-linux

      - name: Windowed desktop compatibility suite (xvfb + Mesa llvmpipe - MUST pass)
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
          ALSOFT_DRIVERS: "null"
          SDL_VIDEO_DRIVER: x11
        run: |
          glxinfo -B > /dev/null 2>&1 || true
          xvfb-run -a -s "-screen 0 1280x1024x24 +extension RANDR" \
            ctest --preset desktop-linux-classic --timeout 300 --repeat until-pass:2

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-classic-logs
          path: |
            build/linux-debug-classic/Testing/**/*.log
            build/linux-debug-classic/tests/**/*.log
            build/linux-debug-classic/tests/**/*.png
            *.log
          if-no-files-found: ignore

  # The Ogre-Next flavor on Linux (Vulkan RS + lavapipe) - the engine's
  # DEFAULT backend, verified per push with the complete desktop suite.
  linux-next:
    name: Linux next - desktop suites
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        # superset of the classic job plus the Mesa Vulkan software driver
        # (lavapipe) and the Vulkan loader's ICD tooling for the smoke run
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang ninja-build ccache python3 pkg-config \
            autoconf autoconf-archive automake libtool curl zip unzip tar \
            libx11-dev libxft-dev libxext-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxfixes-dev libxrender-dev libxss-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxt-dev libxaw7-dev \
            libx11-xcb-dev libxcb-randr0-dev libxtst-dev libxinerama-dev \
            libxcb1-dev libxcb-keysyms1-dev libxcb-ewmh-dev libxcb-icccm4-dev \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libglu1-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev libdbus-1-dev libltdl-dev \
            libibus-1.0-dev \
            xvfb mesa-utils libgl1-mesa-dri \
            mesa-vulkan-drivers vulkan-tools

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: vcpkg-next-v2-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-next-v2-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/.ccache
          key: ccache-next-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-next-${{ runner.os }}-

      - name: Configure (linux-debug-next)
        run: |
          bash Util/ci_configure.sh --preset linux-debug-next \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build (engine + editor + player + tests)
        run: cmake --build --preset linux-debug-next

      - name: Unit tests (headless - MUST pass)
        id: linux_units
        run: ctest --preset unit-linux-next

      # A hard gate: the full Ogre-Next desktop suite under a virtual display.
      # Vulkan renders through lavapipe; audio routes to openal-soft's null
      # backend because hosted runners have no audio device.
      - name: Windowed desktop suite (xvfb + Mesa lavapipe - MUST pass)
        id: linux_desktop
        env:
          ALSOFT_DRIVERS: "null"
          SDL_VIDEO_DRIVER: x11
        run: |
          # steer the Vulkan loader to the software rasterizer; the ICD
          # manifest name varies across Mesa versions, so discover it
          ls /usr/share/vulkan/icd.d/ || true
          LVP_ICD=$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1)
          echo "using ICD: $LVP_ICD"
          export VK_DRIVER_FILES="$LVP_ICD" VK_ICD_FILENAMES="$LVP_ICD"
          vulkaninfo --summary || true
          xvfb-run -a -s "-screen 0 1280x1024x24 +extension RANDR" \
            ctest --preset desktop-linux --timeout 300 --repeat until-pass:2

      # The scripting-OFF configuration enforces the Lua/sol2 dependency seam.
      # It uses Ogre-Next as well so every test configuration exercises the
      # default backend.
      - name: Configure + build + unit tests (ORKIGE_SCRIPTING=OFF - MUST pass)
        id: linux_noscript
        run: |
          bash Util/ci_configure.sh --preset linux-debug-noscript \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build
          cmake --build --preset linux-debug-noscript
          ctest --preset unit-linux-noscript

      # ASan and UBSan stay out of normal developer builds. CI runs the full
      # non-device Ogre-Next suite in a dedicated instrumented tree.
      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /home/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-next-logs
          path: |
            build/linux-debug-next/Testing/**/*.log
            build/linux-debug-next/tests/**/*.log
            build/linux-debug-next/tests/**/*.png
            build/linux-debug-noscript/Testing/**/*.log
            *.log
          if-no-files-found: ignore


  # The ASan + UBSan gate as its own job: the instrumented tree is the
  # slowest Linux build and its verdict must not wait behind (or delay) the
  # plain desktop suites. libstdc++ + clang, full unit + desktop integration
  # suite, ZERO test retries - a nondeterministic memory finding must never
  # be masked.
  linux-sanitizer:
    name: Linux sanitizer (ASan + UBSan) - full suite
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang ninja-build ccache python3 pkg-config \
            autoconf autoconf-archive automake libtool curl zip unzip tar \
            libx11-dev libxft-dev libxext-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxfixes-dev libxrender-dev libxss-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxt-dev libxaw7-dev \
            libx11-xcb-dev libxcb-randr0-dev libxtst-dev libxinerama-dev \
            libxcb1-dev libxcb-keysyms1-dev libxcb-ewmh-dev libxcb-icccm4-dev \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libglu1-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev libdbus-1-dev libltdl-dev \
            libibus-1.0-dev \
            xvfb mesa-utils libgl1-mesa-dri \
            mesa-vulkan-drivers vulkan-tools

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: vcpkg-sanitize-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-sanitize-${{ runner.os }}-
            vcpkg-next-v2-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/.ccache
          key: ccache-sanitize-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-sanitize-${{ runner.os }}-

      - name: Configure + build (ASan + UBSan)
        run: |
          bash Util/ci_configure.sh --preset linux-debug-sanitize \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build
          cmake --build --preset linux-debug-sanitize

      - name: Sanitizer unit + desktop integration suite (MUST pass)
        id: linux_sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          ALSOFT_DRIVERS: "null"
          SDL_VIDEO_DRIVER: x11
        run: |
          LVP_ICD=$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1)
          export VK_DRIVER_FILES="$LVP_ICD" VK_ICD_FILENAMES="$LVP_ICD"
          xvfb-run -a -s "-screen 0 1280x1024x24 +extension RANDR" \
            ctest --preset desktop-linux-sanitize --timeout 300

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /home/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-sanitizer-logs
          path: |
            build/linux-debug-sanitize/Testing/**/*.log
            build/linux-debug-sanitize/tests/**/*.log
            build/linux-debug-sanitize/tests/**/*.png
          if-no-files-found: ignore

  # The browser flavor: the classic GLES2 player cross-compiled to
  # WebAssembly. Builds the wasm dependency set + player + core test module,
  # then runs the full web suite - the Catch2 core units under the emsdk's
  # node and the export structure/pixel-boot tests through the runner's
  # headless Chrome (preinstalled on the hosted Ubuntu image).
  web:
    name: Web (wasm/Emscripten) - build + web suite
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      # the emscripten release the tree is proven against (matches the
      # user-local dev install - see triplets/wasm32-emscripten.cmake)
      EMSDK_VERSION: 6.0.3
      EMSDK: /home/runner/Development/emsdk
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build ccache python3 pkg-config \
            autoconf autoconf-archive automake libtool curl zip unzip tar

      - name: Restore emsdk
        id: emsdk-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/Development/emsdk
          key: emsdk-${{ env.EMSDK_VERSION }}-${{ runner.os }}

      - name: Install emsdk
        if: steps.emsdk-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/emscripten-core/emsdk.git "$EMSDK"
          "$EMSDK/emsdk" install "$EMSDK_VERSION"
          "$EMSDK/emsdk" activate "$EMSDK_VERSION"

      - name: Save emsdk
        if: always() && steps.emsdk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /home/runner/Development/emsdk
          key: ${{ steps.emsdk-cache.outputs.cache-primary-key }}

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: vcpkg-web-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**', 'cmake/wasm32-emscripten-toolchain.cmake') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-web-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/.ccache
          key: ccache-web-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-web-${{ runner.os }}-

      - name: Configure (web-release, vcpkg dependency builds)
        run: bash Util/ci_configure.sh --preset web-release -DVCPKG_INSTALL_OPTIONS=--clean-buildtrees-after-build

      # save right after the configure (that is when vcpkg builds/installs),
      # BEFORE anything that can fail - a red build must not lose the cold
      # dependency work
      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build the wasm player + core test module (MUST pass)
        run: |
          cmake --build --preset web-release --target orkige_player
          cmake --build --preset web-release --target orkige_core_tests

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /home/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Web suite (MUST pass, boot test may not skip)
        run: |
          # the hosted image ships headless Chrome; a skip would mean the
          # driver lost its browser discovery and must fail loudly
          ctest --preset web --timeout 600 --output-log ctest-web.log
          ! grep -q "Skipped" ctest-web.log

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: web-diagnostics
          path: |
            build/web-release/Testing/**/*.log
            ctest-web.log
          if-no-files-found: ignore

  # Android emulator on the default Ogre-Next/Vulkan flavor, as its own
  # job so a broken Android build reports in minutes instead of after the
  # desktop suites. The ANDROID build runs FIRST (the fail-fast the job
  # exists for); the host editor build follows because the Play test drives
  # the emulator from the editor; the emulator boots last.
  android-emulator-next:
    name: Android emulator next - build + Play test
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v7

      # this job is the disk-heaviest (an Android cross tree + the host
      # editor tree + vcpkg caches + SDK/emulator images) and has hit the
      # hosted runner's disk ceiling mid-link - drop the preinstalled
      # toolchains it never uses (the Android SDK stays)
      - name: Reclaim runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/share/swift /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY/CodeQL"
          df -h /

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang ninja-build ccache python3 pkg-config \
            autoconf autoconf-archive automake libtool curl zip unzip tar \
            libx11-dev libxft-dev libxext-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxfixes-dev libxrender-dev libxss-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxt-dev libxaw7-dev \
            libx11-xcb-dev libxcb-randr0-dev libxtst-dev libxinerama-dev \
            libxcb1-dev libxcb-keysyms1-dev libxcb-ewmh-dev libxcb-icccm4-dev \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libglu1-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev libdbus-1-dev libltdl-dev \
            libibus-1.0-dev \
            xvfb mesa-utils libgl1-mesa-dri \
            mesa-vulkan-drivers vulkan-tools

      - name: Install pinned Android build toolchain
        run: |
          SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -path '*/bin/sdkmanager' -type f | sort -V | tail -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $ANDROID_HOME/cmdline-tools" >&2
            exit 1
          fi
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" \
            "ndk;27.2.12479018" \
            "platforms;android-35" \
            "build-tools;35.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: vcpkg-android-next-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-android-next-${{ runner.os }}-
            vcpkg-next-v2-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/.ccache
          key: ccache-android-next-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-android-next-${{ runner.os }}-
            ccache-next-${{ runner.os }}-

      - name: Configure Android + host (vcpkg dependency builds)
        run: |
          bash Util/ci_configure.sh --preset android-emulator-debug-ci \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build
          bash Util/ci_configure.sh --preset linux-debug-next \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      # save right after the configures (that is when vcpkg builds/installs),
      # BEFORE anything that can fail - a red build must not lose the cold
      # dependency work
      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build + package the Android player (MUST pass)
        run: |
          cmake --build --preset android-emulator-debug-ci --target orkige_player
          # a binary-cache hit skips source extraction, but the APK packer
          # pulls SDL's Java glue from the source tarball - prime the download
          # (classic mode from a neutral cwd; the repo root is manifest mode)
          if ! ls "$VCPKG_ROOT_DIR"/downloads/libsdl-org-SDL-release-3.*.tar.gz >/dev/null 2>&1; then
            (cd "$VCPKG_ROOT_DIR" && ./vcpkg install sdl3 --only-downloads)
          fi
          tools/player/android/package_apk.sh build/android-emulator-debug-ci

      - name: Build the host editor (drives the Play test)
        run: cmake --build --preset linux-debug-next

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /home/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Enable emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Emulator Play test (MUST pass)
        uses: reactivecircus/android-emulator-runner@v2.38.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # The emulator action runs EACH LINE of this script as its own
          # `sh -c`: exports do not persist to the next line and a trailing
          # backslash is passed through as a literal argument. Everything
          # the ctest invocation needs must therefore share its one line.
          script: |
            adb install -r build/android-emulator-debug-ci/apk/OrkigePlayer.apk
            adb shell pm path com.orkitec.orkigeplayer
            LVP_ICD=$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1); export VK_DRIVER_FILES="$LVP_ICD" VK_ICD_FILENAMES="$LVP_ICD" ALSOFT_DRIVERS=null SDL_VIDEO_DRIVER=x11; xvfb-run -a -s "-screen 0 1280x1024x24 +extension RANDR" ctest --preset device-linux-android-ci --timeout 420 --repeat until-pass:2

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-emulator-next-logs
          path: |
            build/linux-debug-next/Testing/**/*.log
            build/android-emulator-debug-ci/**/*.log
            *.log
          if-no-files-found: ignore

  # Android emulator on the classic OGRE/GLES2 flavor, as its own
  # job so a broken Android build reports in minutes instead of after the
  # desktop suites. The ANDROID build runs FIRST (the fail-fast the job
  # exists for); the host editor build follows because the Play test drives
