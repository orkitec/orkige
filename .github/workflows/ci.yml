# Orkige CI - Linux build + test on every push and pull request.
#
# Jobs:
#   linux-classic  - the classic OGRE / GL3Plus compatibility flavor: build,
#                  units, and the full non-device desktop suite.
#   linux-next     - the Ogre-Next / Vulkan flavor (the engine's DEFAULT
#                  backend): full desktop tests, scripting-off and sanitizer
#                  gates under Mesa lavapipe, then an x86_64 Android build +
#                  emulator Play test. All hard gates.
#   macos-next     - the default flavor on Apple hardware: full non-device
#                  desktop suite, then an arm64 iOS Simulator build + tests.
#                  Hard gates.
#   windows-next   - the default flavor on MSVC: build + full non-device
#                  desktop suite under Mesa lavapipe software Vulkan. Hard gate.
#
# TIMING EXPECTATIONS: the very first run compiles the whole vcpkg dependency
# set (classic OGRE or Ogre-Next, assimp, freeimage, SDL3, Jolt, OpenAL, Lua,
# imgui, catch2, ... in Debug AND Release) from source - expect 1-2 HOURS per
# job. Every later run restores the vcpkg binary cache + ccache and should
# configure+build in well under 15 minutes. The caches are keyed on
# vcpkg.json + ports/ + triplets/ + the pinned vcpkg commit, so only real
# dependency changes pay the cold price again.
#
# Cache budget: GitHub gives 10 GB per repo; one flavor's binary cache is
# roughly 1-2 GB, ccache is capped at 1 GB per job below.

name: CI

on:
  push:
  pull_request:

# a newer push supersedes the previous run of the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # vcpkg commit the dependency set is proven against locally (the manifest
  # has no builtin-baseline - the checked-out vcpkg tree defines the port
  # versions, so it MUST be pinned for reproducible CI)
  VCPKG_COMMIT: 42e4e33e1505c9f47b58c21e0f557c1571b751ee
  # the presets resolve VCPKG_ROOT to $HOME/Development/vcpkg (same
  # convention as the dev machines - see CMakePresets.json linux-base)
  VCPKG_ROOT_DIR: /home/runner/Development/vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: /home/runner/vcpkg-binary-cache
  CCACHE_DIR: /home/runner/.ccache
  # The next job compiles three host configurations (regular, scripting off,
  # and sanitizers, whose object caches do not overlap) plus Android.
  CCACHE_MAXSIZE: 2G
  # PCH-friendly ccache (same setting CLAUDE.md documents for dev machines).
  CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
  # Build with clang, NOT the runner-default gcc. Orkige is a clang-oriented
  # codebase (AppleClang on the dev Macs, .clangd, the containment lint) and
  # vcpkg port builds inherit these via the stock x64-linux triplet's use of
  # the environment compiler. Concretely this fixes the SDL3 port: SDL3
  # gates -Wdocumentation / -fcomment-block-commands=threadsafety behind a
  # compiler-flag probe that FALSE-POSITIVES on gcc (gcc accepts unknown -W
  # flags during the probe, then errors on real use) - genuine clang flags
  # that only work when the compiler really is clang.
  CC: clang
  CXX: clang++

jobs:
  linux-classic:
    name: Linux classic (GL3Plus) - compatibility build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 240 # cold vcpkg build headroom; cached runs take minutes
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        # - toolchain: build-essential, ninja, ccache, python3 (lint +
        #   integration drivers + asset generators), pkg-config/autotools
        #   (vcpkg port builds)
        # - X11/Wayland dev stacks: SDL3's x11+wayland features and classic
        #   OGRE's GLX window need them; libxaw7-dev/libxt-dev are OGRE's
        #   X11 probe requirements
        # - GL/EGL dev + Mesa: build against GL, run under llvmpipe
        # - xvfb: the virtual X server for the windowed smoke subset
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang ninja-build ccache python3 pkg-config \
            autoconf autoconf-archive automake libtool curl zip unzip tar \
            libx11-dev libxft-dev libxext-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxfixes-dev libxrender-dev libxss-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxt-dev libxaw7-dev \
            libx11-xcb-dev libxcb-randr0-dev libxtst-dev libxinerama-dev \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libglu1-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev libdbus-1-dev libltdl-dev \
            libibus-1.0-dev \
            xvfb mesa-utils libgl1-mesa-dri

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # restore/save split (instead of plain actions/cache) so a failed or
      # timed-out first run still SAVES whatever ports it finished building -
      # the expensive cold build converges across runs instead of restarting
      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: vcpkg-classic-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-classic-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/.ccache
          key: ccache-classic-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-classic-${{ runner.os }}-

      - name: Configure (linux-debug-classic)
        # --clean-after-build keeps vcpkg buildtrees from filling the runner
        # disk during the cold dependency build
        run: |
          cmake --preset linux-debug-classic \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: Save vcpkg binary cache
        # save right after configure (which is when vcpkg builds/installs) -
        # and even when a later step fails
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build (engine + editor + player + samples + tests)
        run: cmake --build --preset linux-debug-classic

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /home/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Unit tests (headless - MUST pass)
        run: ctest --preset unit-linux

      - name: Windowed desktop compatibility suite (xvfb + Mesa llvmpipe - MUST pass)
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
          ALSOFT_DRIVERS: "null"
          SDL_VIDEO_DRIVER: x11
        run: |
          glxinfo -B > /dev/null 2>&1 || true
          xvfb-run -a -s "-screen 0 1280x1024x24 +extension RANDR" \
            ctest --preset desktop-linux-classic --timeout 300

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-classic-logs
          path: |
            build/linux-debug-classic/Testing/**/*.log
            build/linux-debug-classic/tests/**/*.log
            *.log
          if-no-files-found: ignore

  # The Ogre-Next flavor on Linux (Vulkan RS + lavapipe) - the engine's
  # DEFAULT backend, verified per push with the complete desktop suite.
  linux-next:
    name: Linux next + Android emulator - build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        # superset of the classic job plus the Mesa Vulkan software driver
        # (lavapipe) and the Vulkan loader's ICD tooling for the smoke run
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang ninja-build ccache python3 pkg-config \
            autoconf autoconf-archive automake libtool curl zip unzip tar \
            libx11-dev libxft-dev libxext-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxfixes-dev libxrender-dev libxss-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxt-dev libxaw7-dev \
            libx11-xcb-dev libxcb-randr0-dev libxtst-dev libxinerama-dev \
            libxcb1-dev libxcb-keysyms1-dev libxcb-ewmh-dev libxcb-icccm4-dev \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libglu1-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev libdbus-1-dev libltdl-dev \
            libibus-1.0-dev \
            xvfb mesa-utils libgl1-mesa-dri \
            mesa-vulkan-drivers vulkan-tools

      - name: Install pinned Android build toolchain
        run: |
          SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -path '*/bin/sdkmanager' -type f | sort -V | tail -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $ANDROID_HOME/cmdline-tools" >&2
            exit 1
          fi
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" \
            "ndk;27.2.12479018" \
            "platforms;android-35" \
            "build-tools;35.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: vcpkg-next-v2-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-next-v2-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /home/runner/.ccache
          key: ccache-next-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-next-${{ runner.os }}-

      - name: "[linux] Configure (linux-debug-next)"
        run: |
          cmake --preset linux-debug-next \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: "[android] Configure emulator player (x86_64)"
        id: android_configure
        run: |
          cmake --preset android-emulator-debug-ci \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /home/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: "[linux] Build (engine + editor + player + tests)"
        run: cmake --build --preset linux-debug-next

      - name: "[android] Build + package emulator player"
        id: android_build
        run: |
          cmake --build --preset android-emulator-debug-ci --target orkige_player
          # a binary-cache hit skips source extraction, but the APK packer
          # pulls SDL's Java glue from the source tarball - prime the download
          # (classic mode from a neutral cwd; the repo root is manifest mode)
          if ! ls "$VCPKG_ROOT_DIR"/downloads/libsdl-org-SDL-release-3.*.tar.gz >/dev/null 2>&1; then
            (cd "$VCPKG_ROOT_DIR" && ./vcpkg install sdl3 --only-downloads)
          fi
          tools/player/android/package_apk.sh build/android-emulator-debug-ci

      - name: "[linux] Unit tests (headless)"
        id: linux_units
        run: ctest --preset unit-linux-next

      # A hard gate: the full Ogre-Next desktop suite under a virtual display.
      # Vulkan renders through lavapipe; audio routes to openal-soft's null
      # backend because hosted runners have no audio device.
      - name: "[linux] Windowed desktop suite (xvfb + Mesa lavapipe - MUST pass)"
        id: linux_desktop
        env:
          ALSOFT_DRIVERS: "null"
          SDL_VIDEO_DRIVER: x11
        run: |
          # steer the Vulkan loader to the software rasterizer; the ICD
          # manifest name varies across Mesa versions, so discover it
          ls /usr/share/vulkan/icd.d/ || true
          LVP_ICD=$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1)
          echo "using ICD: $LVP_ICD"
          export VK_DRIVER_FILES="$LVP_ICD" VK_ICD_FILENAMES="$LVP_ICD"
          vulkaninfo --summary || true
          xvfb-run -a -s "-screen 0 1280x1024x24 +extension RANDR" \
            ctest --preset desktop-linux --timeout 300

      # The scripting-OFF configuration enforces the Lua/sol2 dependency seam.
      # It uses Ogre-Next as well so every test configuration exercises the
      # default backend.
      - name: "[linux] Configure + build + unit tests (ORKIGE_SCRIPTING=OFF - MUST pass)"
        id: linux_noscript
        run: |
          cmake --preset linux-debug-noscript \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build
          cmake --build --preset linux-debug-noscript
          ctest --preset unit-linux-noscript

      # ASan and UBSan stay out of normal developer builds. CI runs the full
      # non-device Ogre-Next suite in a dedicated instrumented tree.
      - name: "[linux] Configure + build (ASan + UBSan)"
        run: |
          cmake --preset linux-debug-sanitize \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build
          cmake --build --preset linux-debug-sanitize

      - name: "[linux] Sanitizer unit + desktop integration suite (MUST pass)"
        id: linux_sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          ALSOFT_DRIVERS: "null"
          SDL_VIDEO_DRIVER: x11
        run: |
          LVP_ICD=$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1)
          export VK_DRIVER_FILES="$LVP_ICD" VK_ICD_FILENAMES="$LVP_ICD"
          xvfb-run -a -s "-screen 0 1280x1024x24 +extension RANDR" \
            ctest --preset desktop-linux-sanitize --timeout 300

      - name: "[android] Enable emulator acceleration"
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: "[android] Emulator Play test (MUST pass)"
        id: android_play
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # The emulator action runs EACH LINE of this script as its own
          # `sh -c`: exports do not persist to the next line and a trailing
          # backslash is passed through as a literal argument. Everything
          # the ctest invocation needs must therefore share its one line.
          script: |
            adb install -r build/android-emulator-debug-ci/apk/OrkigePlayer.apk
            adb shell pm path com.orkitec.orkigeplayer
            LVP_ICD=$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1); export VK_DRIVER_FILES="$LVP_ICD" VK_ICD_FILENAMES="$LVP_ICD" ALSOFT_DRIVERS=null SDL_VIDEO_DRIVER=x11; xvfb-run -a -s "-screen 0 1280x1024x24 +extension RANDR" ctest --preset device-linux-android-ci --timeout 420

      - name: Platform verdict summary
        if: always()
        run: |
          verdict() { case "$1" in success) echo ok;; skipped|cancelled) echo "-";; *) echo FAILED;; esac; }
          {
            echo "| platform | verdict |"
            echo "|---|---|"
            echo "| linux | units $(verdict '${{ steps.linux_units.outcome }}') / desktop $(verdict '${{ steps.linux_desktop.outcome }}') / noscript $(verdict '${{ steps.linux_noscript.outcome }}') / sanitizer $(verdict '${{ steps.linux_sanitizer.outcome }}') |"
            echo "| android | configure $(verdict '${{ steps.android_configure.outcome }}') / build $(verdict '${{ steps.android_build.outcome }}') / play $(verdict '${{ steps.android_play.outcome }}') |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /home/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-next-logs
          path: |
            build/linux-debug-next/Testing/**/*.log
            build/linux-debug-next/tests/**/*.log
            build/linux-debug-noscript/Testing/**/*.log
            build/linux-debug-sanitize/Testing/**/*.log
            build/linux-debug-sanitize/tests/**/*.log
            build/android-emulator-debug-ci/**/*.log
            *.log
          if-no-files-found: ignore

  # macOS on the default (Ogre-Next) flavor: build everything + the headless
  # unit suite, then build, boot and test the iOS Simulator player.
  macos-next:
    name: macOS next + iOS Simulator - build + tests
    # macos-15's default toolchain: openal-soft 1.25 needs a newer AppleClang
    # than the macos-14 image ships (CTAD in its event handling)
    runs-on: macos-15
    timeout-minutes: 360
    env:
      VCPKG_ROOT_DIR: /Users/runner/Development/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: /Users/runner/vcpkg-binary-cache
      CCACHE_DIR: /Users/runner/.ccache
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          # the runner image ships an untrusted third-party tap that makes
          # every brew call warn - drop it, it serves nothing here
          brew untap aws/tap 2>/dev/null || true
          brew install ninja ccache autoconf automake autoconf-archive libtool

      - name: Check out pinned vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT_DIR"
          git -C "$VCPKG_ROOT_DIR" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT_DIR/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: /Users/runner/vcpkg-binary-cache
          key: vcpkg-macos-next-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-macos-next-${{ runner.os }}-

      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v6
        with:
          path: /Users/runner/.ccache
          key: ccache-macos-next-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-next-${{ runner.os }}-

      - name: "[macos] Configure (macos-debug)"
        run: |
          cmake --preset macos-debug \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: "[ios] Configure Simulator player (arm64)"
        id: ios_configure
        run: |
          cmake --preset ios-simulator-debug \
            -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /Users/runner/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: "[macos] Build (engine + editor + player + tests)"
        run: cmake --build --preset macos-debug

      - name: "[ios] Build Simulator player"
        id: ios_build
        run: cmake --build --preset ios-simulator-debug --target orkige_player

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: /Users/runner/.ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: "[macos] Unit tests (headless)"
        id: macos_units
        run: ctest --preset unit-macos-ci

      - name: "[macos] Complete desktop suite (Metal - MUST pass)"
        id: macos_desktop
        env:
          ALSOFT_DRIVERS: "null"
        run: |
          # list_play_targets probes adb. Start its daemon outside the MCP
          # request deadline so a cold hosted runner cannot consume the whole
          # request while Android device discovery initializes.
          if command -v adb > /dev/null 2>&1; then
            adb start-server
          fi
          ctest --preset desktop-macos-ci --timeout 300

      - name: "[ios] Prepare iPhone 16 simulator"
        run: |
          DEVICE_TYPE=$(xcrun simctl list devicetypes -j | python3 -c 'import json,sys; d=json.load(sys.stdin)["devicetypes"]; phones=[x for x in d if x["name"].startswith("iPhone") and "SE" not in x["name"]]; print(next((x["identifier"] for x in phones if "iPhone 16 Pro" in x["name"]), phones[0]["identifier"]))')
          RUNTIME=$(xcrun simctl list runtimes available -j | python3 -c 'import json,sys; d=json.load(sys.stdin)["runtimes"]; ios=[x for x in d if ".iOS-" in x["identifier"]]; print(max(ios, key=lambda x: tuple(map(int, x["version"].split("."))))["identifier"])')
          UDID=$(xcrun simctl create orkige-ci "$DEVICE_TYPE" "$RUNTIME")
          echo "ORKIGE_CI_SIMULATOR=$UDID" >> "$GITHUB_ENV"

          # CoreSimulator occasionally fails its first boot on hosted runners.
          # Open the UI process explicitly and retry with a bounded 3-minute
          # bootstatus wait instead of hanging the whole job.
          open "$(xcode-select -p)/Applications/Simulator.app"
          BOOTED=false
          for attempt in 1 2 3; do
            echo "Simulator boot attempt $attempt/3 ($UDID)"
            if [ "$attempt" -gt 1 ]; then
              xcrun simctl shutdown "$UDID" || true
              sleep 5
            fi
            xcrun simctl boot "$UDID" || true
            if ORKIGE_SIMULATOR_UDID="$UDID" python3 -c 'import os,subprocess; subprocess.run(["xcrun", "simctl", "bootstatus", os.environ["ORKIGE_SIMULATOR_UDID"], "-b"], check=True, timeout=180)'; then
              BOOTED=true
              break
            fi
          done
          if [ "$BOOTED" != true ]; then
            xcrun simctl list devices available
            exit 1
          fi
          xcrun simctl install "$UDID" build/ios-simulator-debug/tools/player/OrkigePlayer.app

      - name: "[ios] Install the player on the CI simulator"
        run: |
          # the device tests expect the LOCAL convention: a booted simulator
          # with the player app INSTALLED. Install onto the simulator this job
          # already created and booted ($ORKIGE_CI_SIMULATOR) - booting a second
          # one left the app on the wrong device, so the tests' 'auto' pick
          # found a bare simulator and the safe-area gate failed.
          xcrun simctl install "$ORKIGE_CI_SIMULATOR" \
            build/ios-simulator-debug/tools/player/OrkigePlayer.app

      - name: "[ios] Simulator export + runtime tests (MUST pass)"
        id: ios_tests
        env:
          ALSOFT_DRIVERS: "null"
        run: ctest --preset device-macos-ios-ci --timeout 420

      - name: "[ios] Upload test diagnostics"
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-simulator-diagnostics
          path: |
            build/macos-debug/Testing/**/*.log
            build/macos-debug/tests/**/*.log
            ~/Library/Logs/DiagnosticReports/**
          if-no-files-found: ignore

      - name: Platform verdict summary
        if: always()
        run: |
          verdict() { case "$1" in success) echo ok;; skipped|cancelled) echo "-";; *) echo FAILED;; esac; }
          {
            echo "| platform | verdict |"
            echo "|---|---|"
            echo "| macos | units $(verdict '${{ steps.macos_units.outcome }}') / desktop $(verdict '${{ steps.macos_desktop.outcome }}') |"
            echo "| ios | configure $(verdict '${{ steps.ios_configure.outcome }}') / build $(verdict '${{ steps.ios_build.outcome }}') / tests $(verdict '${{ steps.ios_tests.outcome }}') |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "[ios] Remove CI simulator"
        if: always() && env.ORKIGE_CI_SIMULATOR != ''
        run: |
          xcrun simctl shutdown "$ORKIGE_CI_SIMULATOR" || true
          xcrun simctl delete "$ORKIGE_CI_SIMULATOR" || true

  # Windows on the default Ogre-Next flavor. The standard hosted runner has
  # no physical GPU/Vulkan ICD, so the desktop tests install a software driver
  # with Win32 presentation support.
  windows-next:
    name: Windows next (Vulkan) - build + desktop tests
    runs-on: windows-latest
    timeout-minutes: 240
    env:
      VCPKG_ROOT_DIR: C:/Users/runneradmin/Development/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: C:/Users/runneradmin/vcpkg-binary-cache
      # MSVC, not the workflow-level clang (that setting serves the POSIX jobs)
      CC: cl
      CXX: cl
    steps:
      - uses: actions/checkout@v7

      - name: Set up the MSVC environment for Ninja
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Check out pinned vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT_DIR"
          git -C "$env:VCPKG_ROOT_DIR" checkout "$env:VCPKG_COMMIT"
          & "$env:VCPKG_ROOT_DIR/bootstrap-vcpkg.bat" -disableMetrics
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: C:/Users/runneradmin/vcpkg-binary-cache
          key: vcpkg-windows-next-v2-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'ports/**', 'triplets/**') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-windows-next-v2-${{ runner.os }}-

      - name: Configure (windows-debug)
        shell: pwsh
        run: |
          cmake --preset windows-debug -DVCPKG_INSTALL_OPTIONS=--clean-after-build

      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: C:/Users/runneradmin/vcpkg-binary-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build (engine + editor + player + tests)
        shell: pwsh
        run: cmake --build --preset windows-debug

      - name: Unit tests (headless)
        shell: pwsh
        run: ctest --preset unit-windows

      # The Android emulator's bundled SwiftShader ICD is headless on Windows:
      # it omits VK_KHR_win32_surface. Mesa's lavapipe ICD provides software
      # Vulkan with Win32 presentation, so the complete windowed suite remains
      # a hard gate on hosted runners without a GPU.
      - name: Install Mesa software Vulkan driver
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-mesa

      - name: Locate Mesa lavapipe Vulkan driver
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $icd = Join-Path $env:MSYS2_LOCATION "ucrt64/share/vulkan/icd.d/lvp_icd.x86_64.json"
          if (-not (Test-Path $icd)) {
            throw "The MSYS2 Mesa package did not provide $icd"
          }
          Write-Host "Using Vulkan ICD: $icd"
          "VK_DRIVER_FILES=$icd" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VK_ICD_FILENAMES=$icd" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # the ICD's lvp DLL depends on the MSYS2 UCRT runtime DLLs; the test
          # processes load it OUTSIDE any MSYS2 shell, so those DLLs must be
          # resolvable on the plain Windows PATH or instance creation fails
          # with no devices
          $ucrtBin = Join-Path $env:MSYS2_LOCATION "ucrt64/bin"
          $ucrtBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          (Join-Path $env:MSYS2_LOCATION "ucrt64/bin") | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Vulkan loader diagnostics
        shell: pwsh
        run: |
          # the engine-side loader advertises NO surface extensions (win32
          # support missing) - identify which vulkan-1.dll the processes
          # resolve and what a known-good loader reports on this machine
          Get-Command vulkan-1.dll -ErrorAction SilentlyContinue | Format-List
          Get-ChildItem "C:/Windows/System32/vulkan-1.dll" -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse build/windows-debug/vcpkg_installed -Filter vulkan-1.dll -ErrorAction SilentlyContinue | Select-Object FullName
          Get-ChildItem -Recurse build/windows-debug -Filter vulkan-1.dll -ErrorAction SilentlyContinue | Select-Object FullName -First 5

      - name: Use the system Vulkan loader for the test run
        shell: pwsh
        run: |
          # our processes load the vcpkg-built vulkan-1.dll copied next to every
          # test exe, and it enumerates almost nothing - not even VK_KHR_surface -
          # so the render system honestly refuses to draw. MSYS2's Mesa loader is
          # a complete one and is already on PATH; remove the copies so the DLL
          # search resolves it instead.
          Get-ChildItem -Recurse build/windows-debug -Filter vulkan-1.dll |
            ForEach-Object { Write-Host "removing $($_.FullName)"; Remove-Item $_.FullName -Force }

      - name: Complete Windows desktop suite (lavapipe - MUST pass)
        shell: pwsh
        env:
          ALSOFT_DRIVERS: "null"
        run: ctest --preset desktop-windows --timeout 300

      - name: Upload Windows test diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-next-logs
          path: |
            build/windows-debug/Testing/**/*.log
            build/windows-debug/tests/**/*.log
            *.log
          if-no-files-found: ignore
