# MANUAL site redeploys only (https://orkige.orkitec.com): the per-push
# deploy lives as the `site` job INSIDE .github/workflows/ci.yml, so one
# push shows one run. This workflow stays for the workflow_dispatch lever -
# a site nudge without running the whole test matrix.
name: pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deployment at a time; a newer push supersedes an in-flight run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Generate the site (landing + portal + legal pages)
        run: python3 Util/make_help_portal.py --output _site
      - name: Install the API-reference tooling
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - name: Render the /api/ class reference from the engine headers
        run: |
          doxygen Docs/api/Doxyfile
          mv Docs/api/build/html _site/api
      - name: Pin the custom domain
        run: echo orkige.orkitec.com > _site/CNAME
      - name: Upload the site artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
