# Deploys the public site (https://orkige.orkitec.com) on every push to
# main: the landing page + documentation portal + legal pages generated by
# Util/make_help_portal.py, plus the /api/ class reference rendered from the
# engine headers (Docs/api/Doxyfile - that tooling lives only on this
# runner, dev machines never need it). The generator's hard-failing
# broken-link gate and the renderer's nonzero exit on errors mean a broken
# docs state never deploys.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deployment at a time; a newer push supersedes an in-flight run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - name: Generate the site (landing + portal + legal pages)
        run: python3 Util/make_help_portal.py --output _site
      - name: Install the API-reference tooling
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - name: Render the /api/ class reference from the engine headers
        run: |
          doxygen Docs/api/Doxyfile
          mv Docs/api/build/html _site/api
      - name: Pin the custom domain
        run: echo orkige.orkitec.com > _site/CNAME
      - name: Upload the site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
